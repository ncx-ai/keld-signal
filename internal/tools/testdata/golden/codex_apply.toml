# >>> keld (managed by keld CLI — do not edit between markers)
[otel]
environment = "prod"
log_user_prompt = false
exporter = { otlp-http = { endpoint = "https://atlas.keld.co/v1/logs", protocol = "json", headers = { "x-keld-ingest-token" = "tok" } } }
metrics_exporter = { otlp-http = { endpoint = "https://atlas.keld.co/v1/metrics", protocol = "json", headers = { "x-keld-ingest-token" = "tok" } } }

[[hooks.SessionStart]]
hooks = [ { type = "command", command = 'keld __hook --source codex' } ]

[[hooks.PreToolUse]]
hooks = [ { type = "command", command = 'keld __hook --source codex' } ]
