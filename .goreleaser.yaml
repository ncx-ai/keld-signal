version: 2

project_name: keld

before:
  hooks:
    - go mod tidy

builds:
  - id: keld
    main: ./cmd/keld
    binary: keld
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/ncx-ai/keld-signal/internal/version.CLI={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: keld-agent
    main: ./cmd/keld-agent
    binary: keld-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/ncx-ai/keld-signal/internal/version.CLI={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: keld
    ids:
      - keld
      - keld-agent
    name_template: "keld_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

# Auto-generated release-body changelog: group by conventional-commit type and
# drop docs/test/chore/ci/style/merge noise. (The curated human changelog lives
# in CHANGELOG.md.)
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"
      - "^style"
      - "^ci"
      - "^build"
      - "^Merge "
      - "go mod tidy"
  groups:
    - title: Features
      regexp: "^.*feat(\\(.+\\))?:"
      order: 0
    - title: Fixes
      regexp: "^.*fix(\\(.+\\))?:"
      order: 1
    - title: Other changes
      order: 999

release:
  # Tags with a prerelease segment (e.g. v0.3.0-rc.1) are flagged as GitHub
  # pre-releases, so they're not served as "latest" (the install.sh one-liner
  # resolves `releases/latest`, which excludes pre-releases). Unsigned installers
  # are produced whenever the signing secrets are absent — the prerelease default.
  prerelease: auto
  github:
    owner: ncx-ai
    name: keld-signal
