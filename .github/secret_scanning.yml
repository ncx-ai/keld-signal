# Exclude credential-detection TEST FIXTURES from secret scanning.
#
# The credential detector (internal/agent/enrich/creddetect) is a privacy feature
# whose eval corpus and unit tests necessarily contain FAKE-but-format-valid
# credentials (AWS ...EXAMPLE keys, the public jwt.io example JWT, XKCD passwords,
# truncated non-decodable PEM fragments, provider doc example keys). Every value
# was verified non-live in review. These paths are test data, never real secrets.
paths-ignore:
  - "internal/agent/enrich/eval/creds.jsonl"
  - "internal/agent/enrich/eval/gold.jsonl"
  - "internal/agent/enrich/creddetect/*_test.go"
  - "docs/superpowers/plans/2026-07-18-credential-detection-l1.md"
