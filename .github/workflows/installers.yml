name: installers

# Freeze the GLiNER2 sidecar per-OS, package the native installers, sign+notarize
# when the maintainer's secrets are present (unsigned otherwise), and attach the
# artifacts to the published GitHub release. GoReleaser builds keld/keld-agent
# separately; this workflow adds the frozen sidecar + installers.
on:
  release:
    types: [published]
  # On-demand, credential-free dry run: builds UNSIGNED installers on all three
  # OSes and uploads them as workflow artifacts (no release needed, no secrets).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # arm64
            goarch: arm64
          - os: macos-13        # x64
            goarch: amd64
          - os: windows-latest
            goarch: amd64
          - os: ubuntu-latest
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Freeze sidecar
        shell: bash
        run: bash sidecar/build-freeze.sh

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hf-cache
          key: hf-gliner2-large-v1-b122b11eeaee4dabd32bed80412f3234c0d0e943

      - name: Smoke the frozen sidecar
        shell: bash
        env:
          HF_HOME: ${{ github.workspace }}/hf-cache
        run: |
          BIN="dist/keld-agent-sidecar/keld-agent-sidecar"
          [ "${{ runner.os }}" = "Windows" ] && BIN="dist/keld-agent-sidecar/keld-agent-sidecar.exe"
          "$BIN" --port 8399 --host 127.0.0.1 &
          for i in $(seq 1 180); do
            if curl -sf http://127.0.0.1:8399/health | grep -q '"ok":true'; then ok=1; break; fi
            sleep 2
          done
          [ -n "${ok:-}" ] || { echo "sidecar did not become healthy"; exit 1; }

      - name: Stage keld/keld-agent binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          case "${{ runner.os }}" in
            macOS)   goos=darwin;  ext="" ;;
            Windows) goos=windows; ext=".exe" ;;
            Linux)   goos=linux;   ext="" ;;
          esac
          mkdir -p stage
          arch="${{ matrix.goarch }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            # Release: keld/keld-agent come from the GoReleaser archive on the same release.
            asset="keld_${goos}_${arch}.tar.gz"
            [ "$goos" = "windows" ] && asset="keld_${goos}_${arch}.zip"
            gh release download "$TAG" -p "$asset" -D stage_dl
            if [ "$goos" = "windows" ]; then unzip -o "stage_dl/$asset" -d stage; else tar -xzf "stage_dl/$asset" -C stage; fi
          else
            # Dry run (workflow_dispatch): no release to pull from, so build the
            # binaries natively on this runner (runner arch == matrix arch, no cross-compile).
            GOOS=$goos GOARCH=$arch go build -o "stage/keld${ext}" ./cmd/keld
            GOOS=$goos GOARCH=$arch go build -o "stage/keld-agent${ext}" ./cmd/keld-agent
          fi
          cp -R dist/keld-agent-sidecar stage/ 2>/dev/null || cp -R dist/keld-agent-sidecar/* stage/

      - name: Package macOS .pkg
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
          APPLE_DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: |
          # Flatten sidecar one-dir beside keld-agent in the payload.
          VER="${{ github.event.release.tag_name }}"
          [ -z "$VER" ] && VER="0.0.0-dryrun"
          bash installers/macos/build-pkg.sh "$VER" stage "${{ matrix.goarch }}"

      - name: Package Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          KELD_VERSION: ${{ github.event.release.tag_name }}
        run: |
          if (-not $env:KELD_VERSION) { $env:KELD_VERSION = "0.0.0-dryrun" }
          Copy-Item -Recurse -Force dist\keld-agent-sidecar installers\windows\keld-agent-sidecar
          Copy-Item stage\keld.exe, stage\keld-agent.exe installers\windows\
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc installers\windows\keld-agent.iss
          if ($env:WINDOWS_CERT_PFX) { Write-Host "signtool sign step (gated) would run here" }

      - name: Package Linux sidecar tarball
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          tar -C dist -czf "keld-agent-sidecar_linux_${{ matrix.goarch }}.tar.gz" keld-agent-sidecar

      # Release runs attach the installers to the GitHub release.
      - name: Upload installers to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keld-*-*.pkg
            installers/windows/Output/keld-setup.exe
            keld-agent-sidecar_*.tar.gz

      # Dry runs (workflow_dispatch) publish the unsigned installers as downloadable
      # workflow artifacts instead — no release, no credentials required.
      - name: Upload installers as artifacts (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}-${{ matrix.goarch }}
          if-no-files-found: ignore
          path: |
            keld-*-*.pkg
            installers/windows/Output/keld-setup.exe
            keld-agent-sidecar_*.tar.gz
