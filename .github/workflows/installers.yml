name: installers

# Freeze the GLiNER2 sidecar per-OS, package the native installers, sign+notarize
# when the maintainer's secrets are present (unsigned otherwise), and attach the
# artifacts to the published GitHub release. GoReleaser builds keld/keld-agent
# separately; this workflow adds the frozen sidecar + installers.
on:
  # Called by release.yml after GoReleaser publishes the release. GoReleaser creates the
  # release with the default GITHUB_TOKEN, whose events do NOT trigger `release: published`,
  # so chaining via workflow_call is the reliable way to run on every real release.
  workflow_call:
    inputs:
      publish_release:
        description: "Attach the built installers to the release tagged `release_tag`."
        type: boolean
        default: false
      release_tag:
        description: "The release tag to stage GoReleaser archives from and upload assets to."
        type: string
        default: ""
    secrets:
      APPLE_DEVELOPER_ID_APP: { required: false }
      APPLE_DEVELOPER_ID_INSTALLER: { required: false }
      APPLE_NOTARY_KEY: { required: false }
      APPLE_NOTARY_KEY_ID: { required: false }
      APPLE_NOTARY_ISSUER: { required: false }
  # A manually published release (e.g. via the GitHub UI, not GoReleaser's GITHUB_TOKEN) still
  # fires this and attaches the installers.
  release:
    types: [published]
  # On-demand, credential-free dry run: builds UNSIGNED installers on all three
  # OSes and uploads them as workflow artifacts (no release needed, no secrets).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # `IS_RELEASE`: attach to a GitHub release when triggered by a `release` event OR chained
    # from release.yml (`inputs.publish_release`). `TAG`: the release tag in either mode.
    # (github.event_name inside a workflow_call reflects the CALLER's event — `push` — not
    # `workflow_call`, so we branch on inputs, never on github.event_name, for the chained path.)
    env:
      IS_RELEASE: ${{ github.event_name == 'release' || inputs.publish_release }}
      TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only. No Intel macOS leg: PyTorch dropped Intel-mac wheels after
          # torch 2.2.2 (Apple Silicon only since 2.3), and macOS 27 (Fall 2026) is
          # Apple-Silicon-only — so a torch-based sidecar can't meaningfully target Intel macOS.
          - os: macos-14        # arm64
            goarch: arm64
          - os: windows-latest
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Freeze sidecar (obfuscated)
        shell: bash
        env:
          KELD_OBFUSCATE: "1"   # shipped artifacts are obfuscated; dev builds stay plain
        run: |
          python -m pip install --quiet python-minifier pyarmor
          bash sidecar/build-freeze.sh

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hf-cache
          key: hf-gliner2-large-v1-b122b11eeaee4dabd32bed80412f3234c0d0e943

      - name: Smoke the frozen sidecar
        shell: bash
        env:
          HF_HOME: ${{ github.workspace }}/hf-cache
        run: |
          BIN="dist/keld-agent-sidecar/keld-agent-sidecar"
          [ "${{ runner.os }}" = "Windows" ] && BIN="dist/keld-agent-sidecar/keld-agent-sidecar.exe"
          "$BIN" --port 8399 --host 127.0.0.1 &
          for i in $(seq 1 180); do
            if curl -sf http://127.0.0.1:8399/health | grep -q '"ok"'; then ok=1; break; fi
            sleep 2
          done
          [ -n "${ok:-}" ] || { echo "sidecar did not become healthy"; exit 1; }
          # Spawn acceptance gate: a real /classify spawns the inference worker
          # child, which must import the (obfuscated) modules from the frozen
          # bundle. /health alone never spawns a worker, so this is the ONLY CI
          # coverage for frozen-distribution worker spawn (freeze_support, pyarmor
          # runtime bundling, multiprocessing under PyInstaller).
          resp=$(curl -sf -m 120 -X POST http://127.0.0.1:8399/classify \
            -H 'Content-Type: application/json' \
            -d '{"text":"debug the login bug","tasks":{"task_type":["debug","other"]}}') \
            || { echo "frozen worker /classify failed — spawn/import/bundle broke"; exit 1; }
          echo "$resp" | grep -q '"task_type"' \
            || { echo "frozen worker returned no result: $resp"; exit 1; }
          echo "frozen worker spawn + inference OK"

      - name: Stage keld/keld-agent binaries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ runner.os }}" in
            macOS)   goos=darwin;  ext="" ;;
            Windows) goos=windows; ext=".exe" ;;
            Linux)   goos=linux;   ext="" ;;
          esac
          mkdir -p stage
          arch="${{ matrix.goarch }}"
          if [ "$IS_RELEASE" = "true" ]; then
            # Release: keld/keld-agent come from the GoReleaser archive on the same release.
            asset="keld_${goos}_${arch}.tar.gz"
            [ "$goos" = "windows" ] && asset="keld_${goos}_${arch}.zip"
            gh release download "$TAG" -p "$asset" -D stage_dl
            if [ "$goos" = "windows" ]; then unzip -o "stage_dl/$asset" -d stage; else tar -xzf "stage_dl/$asset" -C stage; fi
          else
            # Dry run (workflow_dispatch): no release to pull from, so build the
            # binaries natively on this runner (runner arch == matrix arch, no cross-compile).
            # Strip symbols to match the release (GoReleaser) binaries, which
            # already build with -s -w.
            GOOS=$goos GOARCH=$arch go build -ldflags "-s -w" -o "stage/keld${ext}" ./cmd/keld
            GOOS=$goos GOARCH=$arch go build -ldflags "-s -w" -o "stage/keld-agent${ext}" ./cmd/keld-agent
          fi
          cp -R dist/keld-agent-sidecar stage/ 2>/dev/null || cp -R dist/keld-agent-sidecar/* stage/

      - name: Package macOS .pkg
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
          APPLE_DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: |
          # Flatten sidecar one-dir beside keld-agent in the payload.
          VER="$TAG"
          [ -z "$VER" ] && VER="0.0.0-dryrun"
          bash installers/macos/build-pkg.sh "$VER" stage "${{ matrix.goarch }}"

      - name: Package Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          KELD_VERSION: ${{ env.TAG }}
        run: |
          if (-not $env:KELD_VERSION) { $env:KELD_VERSION = "0.0.0-dryrun" }
          Copy-Item -Recurse -Force dist\keld-agent-sidecar installers\windows\keld-agent-sidecar
          Copy-Item stage\keld.exe, stage\keld-agent.exe installers\windows\
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc installers\windows\keld-agent.iss
          if ($env:WINDOWS_CERT_PFX) { Write-Host "signtool sign step (gated) would run here" }

      # Release runs attach the installers to the GitHub release.
      - name: Upload installers to release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keld-*-*.pkg
            installers/windows/Output/keld-setup.exe

      # Dry runs (workflow_dispatch) publish the unsigned installers as downloadable
      # workflow artifacts instead — no release, no credentials required.
      - name: Upload installers as artifacts (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}-${{ matrix.goarch }}
          if-no-files-found: ignore
          path: |
            keld-*-*.pkg
            installers/windows/Output/keld-setup.exe

  # The Linux sidecar is frozen in a manylinux_2_28 container (glibc 2.28), NOT on the
  # ubuntu-latest runner. PyInstaller does not bundle glibc, so the frozen binary demands the
  # target's glibc be >= the BUILD glibc; ubuntu-latest (glibc 2.39) would only run on the very
  # newest distros. Freezing against the manylinux 2.28 baseline makes the sidecar run on any
  # distro with glibc >= 2.28 — RHEL/Alma/Rocky 8+, Debian 10+, Ubuntu 18.04+, Arch, Fedora,
  # Amazon Linux 2023. (manylinux_2_28 is also the oldest baseline whose glibc still satisfies
  # GitHub Actions' bundled node20, so the JS actions below run inside the container.)
  # macOS/Windows bundle the sidecar inside their native installers, so only Linux ships it as a
  # standalone tarball — which install.sh downloads.
  linux-sidecar:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    env:
      IS_RELEASE: ${{ github.event_name == 'release' || inputs.publish_release }}
      TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      # manylinux's /opt/python CPython is built statically (no libpython.so), which PyInstaller
      # cannot freeze against. manylinux_2_28 is AlmaLinux 8, whose python3.12 RPM IS built
      # --enable-shared and links glibc 2.28 — exactly the shared interpreter + old baseline we
      # need. Install and freeze against that instead.
      # Reference /usr/bin/python3.12 by absolute path throughout: the manylinux image keeps its
      # static /opt/python/cp312-cp312/bin first on PATH, so bare `python3.12` would resolve to
      # the static interpreter we can't freeze against.
      - name: Install shared CPython 3.12 (glibc 2.28)
        run: |
          dnf install -y python3.12 python3.12-devel
          /usr/bin/python3.12 -m ensurepip --upgrade
          /usr/bin/python3.12 -m pip install --upgrade pip

      - name: Freeze sidecar (obfuscated, glibc 2.28 baseline)
        shell: bash
        env:
          KELD_OBFUSCATE: "1"   # shipped artifacts are obfuscated; dev builds stay plain
          PYTHON: /usr/bin/python3.12
          # torch's default Linux wheel hard-depends on the CUDA 13 stack (cuda-toolkit,
          # nvidia-*), so the frozen bundle needs libcudart.so.13 at runtime and won't load on
          # CPU-only machines — which is every device the sidecar runs on (GLiNER2 runs on CPU;
          # macOS/Windows already ship CPU torch). Pin the CPU build: pre-install it from the
          # CPU index, and expose that index to build-freeze.sh's own requirements install (the
          # `+cpu` local version outranks the plain PyPI wheel, so gliner2's torch dep stays CPU).
          PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
        run: |
          /usr/bin/python3.12 -m pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          /usr/bin/python3.12 -m pip install --quiet python-minifier pyarmor
          bash sidecar/build-freeze.sh

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hf-cache
          key: hf-gliner2-large-v1-b122b11eeaee4dabd32bed80412f3234c0d0e943

      - name: Smoke the frozen sidecar
        shell: bash
        env:
          HF_HOME: ${{ github.workspace }}/hf-cache
        run: |
          BIN="dist/keld-agent-sidecar/keld-agent-sidecar"
          "$BIN" --port 8399 --host 127.0.0.1 &
          for i in $(seq 1 180); do
            if curl -sf http://127.0.0.1:8399/health | grep -q '"ok"'; then ok=1; break; fi
            sleep 2
          done
          [ -n "${ok:-}" ] || { echo "sidecar did not become healthy"; exit 1; }
          # Real /classify spawns the inference worker child, which must import the (obfuscated)
          # modules from the frozen bundle — the only CI coverage for frozen worker spawn. It
          # also proves the glibc-2.28-linked binary actually runs (here, inside the 2.28 image).
          resp=$(curl -sf -m 120 -X POST http://127.0.0.1:8399/classify \
            -H 'Content-Type: application/json' \
            -d '{"text":"debug the login bug","tasks":{"task_type":["debug","other"]}}') \
            || { echo "frozen worker /classify failed — spawn/import/bundle broke"; exit 1; }
          echo "$resp" | grep -q '"task_type"' \
            || { echo "frozen worker returned no result: $resp"; exit 1; }
          echo "frozen worker spawn + inference OK (glibc 2.28 baseline)"

      - name: Package Linux sidecar tarball
        shell: bash
        run: tar -C dist -czf "keld-agent-sidecar_linux_amd64.tar.gz" keld-agent-sidecar

      - name: Upload sidecar to release
        if: env.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: keld-agent-sidecar_linux_amd64.tar.gz

      - name: Upload sidecar as artifact (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: installers-linux-amd64
          if-no-files-found: ignore
          path: keld-agent-sidecar_linux_amd64.tar.gz
